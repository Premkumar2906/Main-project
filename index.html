<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Brand Awareness Survey</title>

<style>
body{
 font-family:Arial;
 background:#f4f6f8;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}

.container{
 background:white;
 padding:25px;
 width:350px;
 border-radius:10px;
 box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
 text-align:center;
}

input,select{
 width:100%;
 padding:8px;
 margin:8px 0;
}

button{
 width:100%;
 padding:10px;
 background:#007bff;
 border:none;
 color:white;
 cursor:pointer;
 border-radius:6px;
}

button:hover{
 background:#0056b3;
}
</style>

</head>
<body>

<div class="container">
<h2>Brand Awareness Survey</h2>

<form action="../Backend/login.php" method="POST">

<label>Name</label>
<input type="text" name="name" required>

<label>Age</label>
<input type="number" name="age" required>

<label>Gender</label>
<select name="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>Favorite Platform</label>
<select name="platform">
<option>Instagram</option>
<option>YouTube</option>
<option>Facebook</option>
<option>Twitter</option>
</select>

<label>Awareness Level (1-5)</label>
<input type="number" name="awareness_level" min="1" max="5" required>

<button type="submit">Submit Survey</button>

</form>

</div>

</body>
</html>
